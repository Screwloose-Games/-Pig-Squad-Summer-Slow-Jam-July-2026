name: "publish to itch.io"
on:
  # Runs after "Build Godot Game" finishes (i.e. after a version tag is pushed).
  # NOTE: no `branches:` filter — tag-triggered upstream runs have no branch, so
  # a branch filter would silently exclude them.
  workflow_run:
    workflows: ["Build Godot Game"]
    types:
      - completed

env:
  GODOT_VERSION: 4.7.1
  ITCH_USER: ${{ vars.ITCH_USER }}
  ITCH_GAME: ${{ vars.ITCH_GAME }}
  BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
  PROJECT_PATH: .

jobs:
  release_web:
    runs-on: ubuntu-latest
    # Only publish when the upstream build actually succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: game_web
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: deploy to itch.io (web)
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: web
          ITCH_GAME: ${{ env.ITCH_GAME }}
          ITCH_USER: ${{ env.ITCH_USER }}
          PACKAGE: game_web.zip
          # head_branch on a tag-triggered run is the tag name, e.g. "v1.2.0".
          VERSION: ${{ github.event.workflow_run.head_branch }}

