name: Validate Audio Files

on:
  pull_request:
    paths:
      - '**/*.wav'
      - '**/*.ogg'
      - '**/*.mp3'

permissions:
  pull-requests: write
  contents: read
jobs:
  validate-audio:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Find changed Audio files
      id: changed-files
      uses: tj-actions/changed-files@v46
      with:
        json: true
        files: |
          **.wav
          **.ogg
          **.mp3

    - name: Save changed files list
      if: steps.changed-files.outputs.any_changed == 'true'
      id: audio_files
      run: |
        cat <<'ALL_CHANGED_FILES_EOF' > all_changed_files.json
        ${{ steps.changed-files.outputs.all_changed_files }}
        ALL_CHANGED_FILES_EOF
        python - <<'PYEOF'
        import json
        with open("all_changed_files.json", encoding="utf-8") as fh:
            files = json.load(fh)
        files = [f for f in files if f.lower().endswith((".wav", ".ogg", ".mp3"))]
        with open("audio_files.txt", "w", encoding="utf-8") as out:
            out.write("\n".join(files))
        PYEOF
        if [ -s audio_files.txt ]; then
          echo "files=true" >> "$GITHUB_OUTPUT"
        else
          echo "files=" >> "$GITHUB_OUTPUT"
        fi

    - name: Validate audio files
      if: steps.audio_files.outputs.files != ''
      id: validate-audio-files
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_ISSUE_NUMBER: ${{ github.event.pull_request.number }}
      run: python .github/scripts/validate-audio-files.py --file-list audio_files.txt

    - name: Comment PR
      if: steps.audio_files.outputs.files != ''
      uses: thollander/actions-comment-pull-request@v3
      with:
        comment-tag: sound-file-checks
        github-token: ${{ secrets.GITHUB_TOKEN }}
        message: |
          # This PR has been checked for audio files. 🔊
          ## File Reports:
          ${{ fromJson(steps.validate-audio-files.outputs.metadata).audio_reports }}
          <br />
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_ISSUE_NUMBER: ${{ github.event.pull_request.number }}

    - name: Fail if audio file validation errors were found
      if: steps.audio_files.outputs.files != '' && steps.validate-audio-files.outputs.has_errors == 'true'
      run: |
        echo "Error: one or more audio files failed validation (see PR comment for details)."
        exit 1